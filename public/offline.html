<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YANSAM Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(255,255,255,.96), rgba(246,215,222,.8) 34%, rgba(234,217,201,.88) 68%, rgba(255,248,241,.98) 100%);
        color: #6b4350;
        font-family: Inter, system-ui, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        border: 1px solid rgba(255,255,255,.6);
        background: rgba(255,255,255,.58);
        backdrop-filter: blur(18px);
        border-radius: 28px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 22px 70px rgba(166,96,113,.16);
      }
      h1 { font-family: Georgia, serif; font-size: 36px; margin: 8px 0; }
      p { line-height: 1.8; opacity: .85; }
    </style>
  </head>
  <body>
    <div class="card">
      <p style="letter-spacing:.28em;text-transform:uppercase;font-size:12px;opacity:.6">Private for two</p>
      <h1>YANSAM</h1>
      <p>You are offline right now. Once the connection returns, your shared sanctuary will be ready again.</p>
    </div>
  </body>
</html>
